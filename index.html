<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WK Rotor Control</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="title" id="appTitle" title="Clicca per modificare il nome">WK Rotor Control</div>
      <div class="serial-controls">
        <label>
          COM:
          <select id="comPort">
            <option>COM1</option><option>COM2</option><option>COM3</option><option>COM4</option>
            <option>COM5</option><option>COM6</option><option selected>COM7</option>
            <option>COM8</option><option>COM9</option><option>COM10</option>
          </select>
        </label>
        <label>
          BAUD:
          <select id="baudRate">
            <option>1200</option><option>2400</option><option>4800</option>
            <option selected>9600</option><option>19200</option><option>38400</option>
          </select>
        </label>
        <button id="powerBtn" class="power off">OFF</button>
        <div id="powerLed" class="led off"></div>
      </div>
    </header>

    <main class="main">
      <div class="locator-row">
        <label class="locator-label">LOCATOR:</label>
        <input type="text" id="locatorInput" class="locator-input" placeholder="JN61fv" maxlength="6" spellcheck="false" />
        <button id="generateMapBtn" class="generate-btn">GENERATE MAP</button>
        <button id="saveMapBtn" class="save-btn">SAVE</button>
        <div id="generateSpinner" class="generate-spinner hidden"></div>
      </div>

      <div class="compass-wrap" id="compassWrap">
        <canvas id="compass" width="420" height="420"></canvas>
        <div class="compass-center-dot"></div>
        <div class="compass-upload" id="compassUpload">
          <span class="upload-icon">+</span>
          <span class="upload-text">Carica mappa quadrante</span>
        </div>
        <input type="file" id="mapInput" accept="image/*,.pdf" class="hidden">
      </div>

      <div class="readouts">
        <div class="target-line">TARGET: <span id="targetVal">000</span></div>
        <div class="current-line" id="currentVal">000</div>
      </div>

      <div class="step-row">
        <button class="step-btn" data-step="-10">-10</button>
        <button class="step-btn" data-step="-5">-5</button>
        <button class="step-btn" data-step="+5">+5</button>
        <button class="step-btn" data-step="+10">+10</button>
      </div>

      <div class="action-row">
        <button id="goBtn" class="go">GO</button>
        <button id="stopBtn" class="stop">STOP</button>
      </div>

      <div class="preset-panel">
        <button class="preset" data-preset="0">0</button>
        <button class="preset" data-preset="45">45</button>
        <button class="preset" data-preset="90">90</button>
        <button class="preset" data-preset="135">135</button>
        <button class="preset" data-preset="180">180</button>
        <button class="preset" data-preset="225">225</button>
        <button class="preset" data-preset="270">270</button>
        <button class="preset" data-preset="315">315</button>
        <button class="preset" data-preset="360">360</button>
        <button class="preset park" data-preset="0">Park</button>
      </div>

      <div class="settings-section">
        <div class="settings-header" id="settingsToggle">
          <span class="settings-title">LIMITS &amp; OVERLAP</span>
          <span class="settings-arrow" id="settingsArrow">&#9660;</span>
        </div>
        <div class="settings-body" id="settingsBody">
          <div class="settings-row">
            <label class="settings-label">
              <input type="checkbox" id="overlapCheck" checked>
              <span>OVERLAP</span>
            </label>
            <div class="settings-inputs">
              <input type="number" id="overlapStart" class="settings-input" value="315" min="0" max="360" placeholder="Start">
              <span class="settings-sep">&ndash;</span>
              <input type="number" id="overlapEnd" class="settings-input" value="45" min="0" max="360" placeholder="End">
            </div>
          </div>
          <div class="settings-row">
            <label class="settings-label">
              <input type="checkbox" id="limitCheck">
              <span>LIMIT</span>
            </label>
            <div class="settings-inputs">
              <input type="number" id="limitMin" class="settings-input" value="30" min="0" max="360" placeholder="Min" disabled>
              <span class="settings-sep">&ndash;</span>
              <input type="number" id="limitMax" class="settings-input" value="330" min="0" max="360" placeholder="Max" disabled>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="app-footer">
      <a href="https://iu2vwk.com" target="_blank">IU2VWK.com</a>
      <span class="footer-sep">|</span>
      <span>&copy; 2026 IU2VWK — All rights reserved</span>
    </footer>
  </div>

  <script src="js/rotor.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
